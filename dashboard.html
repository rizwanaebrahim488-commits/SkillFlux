<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlux | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --accent: #00d4ff;
            --card: #111;
            --border: #222;
            --text: #fff;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        /* Dashboard Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #000;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left { display: flex; gap: 30px; align-items: center; }
        .nav-brand { font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .nav-link { color: #888; text-decoration: none; cursor: pointer; font-size: 14px; }
        .nav-link:hover { color: var(--accent); }

        .user-stats { background: rgba(0, 212, 255, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }

        /* Main Content */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        /* Post Skill Section */
        .post-box { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 8px; margin-bottom: 40px; }
        .post-box input, .post-box textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box; }
        .btn-post { background: var(--accent); color: #000; padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Skill Feed */
        .feed-header { border-bottom: 1px solid var(--border); margin-bottom: 20px; padding-bottom: 10px; }
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .skill-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; position: relative; }
        .skill-card h3 { color: var(--accent); margin-top: 0; }
        .skill-card .meta { font-size: 12px; color: #666; margin-bottom: 15px; }
        .btn-acquire { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-acquire:hover { background: var(--accent); color: #000; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="nav-brand">SKILLFLUX</div>
            <a class="nav-link" onclick="showSection('feed')">SKILL FEED</a>
            <a class="nav-link" onclick="showSection('post')">POST A SKILL</a>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="user-stats">Credits: <span id="creditBalance">0</span></div>
            <a class="nav-link" style="color: red;" href="index.html">LOGOUT</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="postSection" class="post-box hidden">
            <h2 style="margin-top:0">Distribute Knowledge</h2>
            <input type="text" id="skillTitle" placeholder="Skill Title (e.g. Advanced Python)">
            <textarea id="skillDesc" rows="3" placeholder="Describe what the learner will achieve in 1 hour..."></textarea>
            <button class="btn-post" id="publishBtn">PUBLISH PROTOCOL</button>
        </section>

        <section id="feedSection">
            <div class="feed-header">
                <h2>AVAILABLE EXCHANGES</h2>
            </div>
            <div class="skill-grid" id="skillGrid">
                </div>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3UlP_V8aDYmybmcIseDn-NkVIE2CNhT8",
            authDomain: "skillflux-cf990.firebaseapp.com",
            projectId: "skillflux-cf990",
            storageBucket: "skillflux-cf990.firebasestorage.app",
            messagingSenderId: "25137352875",
            appId: "1:25137352875:web:f01bcbaa3eb64f99a527ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // UI Toggle
        window.showSection = (section) => {
            document.getElementById('postSection').classList.toggle('hidden', section !== 'post');
            document.getElementById('feedSection').classList.toggle('hidden', section !== 'feed');
        };

        // Auth & Data Load
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadUserData();
                loadSkills();
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadUserData() {
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                document.getElementById('creditBalance').innerText = userSnap.data().credits;
            }
        }

        // Post Skill
        document.getElementById('publishBtn').onclick = async () => {
            const title = document.getElementById('skillTitle').value;
            const desc = document.getElementById('skillDesc').value;
            if(!title || !desc) return alert("All fields required");

            await addDoc(collection(db, "skills"), {
                title,
                desc,
                author: currentUser.email,
                authorId: currentUser.uid,
                createdAt: new Date()
            });
            alert("Skill Posted! You will earn 1 credit when someone acquires this.");
            showSection('feed');
        };

        // Load Feed
        function loadSkills() {
            onSnapshot(collection(db, "skills"), (snapshot) => {
                const grid = document.getElementById('skillGrid');
                grid.innerHTML = "";
                snapshot.forEach((doc) => {
                    const skill = doc.data();
                    const card = `
                        <div class="skill-card">
                            <h3>${skill.title}</h3>
                            <p class="meta">By: ${skill.author}</p>
                            <p>${skill.desc}</p>
                            <button class="btn-acquire" onclick="acquireSkill('${doc.id}', '${skill.authorId}')">ACQUIRE (1 CREDIT)</button>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            });
        }

        // Acquire Logic
        window.acquireSkill = async (skillId, authorId) => {
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            const credits = userSnap.data().credits;

            if(credits < 1) return alert("Insufficient Credits! Teach a skill to earn more.");
            if(currentUser.uid === authorId) return alert("You cannot acquire your own skill.");

            // Transaction: User -1, Teacher +1
            await updateDoc(userRef, { credits: increment(-1) });
            await updateDoc(doc(db, "users", authorId), { credits: increment(1) });

            alert("Skill Acquired! 1 Credit transferred. Check your email for meeting details.");
            loadUserData();
        };
    </script>
</body>
</html>
