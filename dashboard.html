<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlux | Elite Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #030303; --accent: #00d4ff; --card: #0a0a0a; --border: #1a1a1a; 
            --text: #f0f0f0; --danger: #ff4444; --pending: #ffbb00; --success: #00ff88;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        
        /* Navigation */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .nav-left { display: flex; gap: 20px; align-items: center; }
        .nav-brand { font-weight: 900; color: var(--accent); letter-spacing: 3px; font-size: 20px; }
        .nav-link { color: #666; text-decoration: none; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 1px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        
        .user-stats { background: rgba(0, 212, 255, 0.05); padding: 8px 18px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; font-size: 14px; }

        /* Layout */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .hidden { display: none; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 4px; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { border-color: #333; }
        
        /* Typography */
        h2 { font-size: 14px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; border-left: 3px solid var(--accent); padding-left: 15px; }
        
        /* Buttons & Inputs */
        .btn { padding: 10px 20px; border: none; cursor: pointer; font-weight: 700; border-radius: 2px; font-size: 12px; transition: 0.3s; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 2px; }
        input:focus { border-color: var(--accent); outline: none; }

        /* History Table */
        table { width: 100%; border-collapse: collapse; background: var(--card); }
        th { text-align: left; padding: 15px; color: #444; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .status-pending { color: var(--pending); font-weight: bold; }
        .status-completed { color: var(--success); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="nav-brand">SKILLFLUX</div>
            <a class="nav-link" id="link-feed" onclick="showSection('feed')">GLOBAL FEED</a>
            <a class="nav-link" id="link-my-posts" onclick="showSection('my-posts')">MY POSTS</a>
            <a class="nav-link" id="link-requests" onclick="showSection('requests')">REQUESTS</a>
            <a class="nav-link" id="link-history" onclick="showSection('history')">HISTORY</a>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="user-stats"><i class="fas fa-bolt"></i> <span id="creditBalance">0</span> CR</div>
            <a href="index.html" class="nav-link" style="color: var(--danger);">LOGOUT</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="feedSection">
            <h2>NETWORK SKILL PROTOCOLS</h2>
            <div id="globalFeed"></div>
        </section>

        <section id="my-postsSection" class="hidden">
            <h2>PUBLISH NEW EXPERTISE</h2>
            <div class="card" style="border-style: dashed; border-color: #333;">
                <input type="text" id="skillTitle" placeholder="Skill Name (e.g. React Native Architecture)">
                <textarea id="skillDesc" rows="3" placeholder="What will you teach in 1 hour?"></textarea>
                <button class="btn btn-primary" id="saveBtn">INITIALIZE POST</button>
            </div>
            <h2>YOUR ACTIVE LISTINGS</h2>
            <div id="mySkillsFeed"></div>
        </section>

        <section id="requestsSection" class="hidden">
            <h2>INCOMING ACCESS REQUESTS</h2>
            <div id="incomingList"></div>
        </section>

        <section id="historySection" class="hidden">
            <h2>TRANSACTION ARCHIVE</h2>
            <table>
                <thead><tr><th>PROTOCOL</th><th>PARTNER</th><th>STATUS</th><th>DATA / ACTION</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, increment, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3UlP_V8aDYmybmcIseDn-NkVIE2CNhT8",
            authDomain: "skillflux-cf990.firebaseapp.com",
            projectId: "skillflux-cf990",
            storageBucket: "skillflux-cf990.firebasestorage.app",
            messagingSenderId: "25137352875",
            appId: "1:25137352875:web:f01bcbaa3eb64f99a527ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        window.showSection = (name) => {
            ['feed', 'my-posts', 'requests', 'history'].forEach(s => {
                document.getElementById(s+'Section').classList.add('hidden');
                document.getElementById('link-'+s).classList.remove('active');
            });
            document.getElementById(name+'Section').classList.remove('hidden');
            document.getElementById('link-'+name).classList.add('active');
        };

        onAuthStateChanged(auth, u => { if(u) { user = u; init(); } else { window.location.href="index.html"; } });

        function init() {
            onSnapshot(doc(db, "users", user.uid), s => { document.getElementById('creditBalance').innerText = s.data().credits; });
            loadGlobalFeed();
            loadMySkills();
            loadIncomingRequests();
            loadHistory();
        }

        // POST SKILL
        document.getElementById('saveBtn').onclick = async () => {
            const title = document.getElementById('skillTitle').value;
            const desc = document.getElementById('skillDesc').value;
            if(!title) return;
            await addDoc(collection(db, "skills"), { title, desc, uid: user.uid, email: user.email });
            document.getElementById('skillTitle').value = '';
            document.getElementById('skillDesc').value = '';
            alert("Protocol Uploaded.");
        };

        // GLOBAL FEED
        function loadGlobalFeed() {
            onSnapshot(collection(db, "skills"), s => {
                const feed = document.getElementById('globalFeed');
                feed.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    if(data.uid === user.uid) return;
                    feed.innerHTML += `<div class="card"><h3>${data.title}</h3><p style="color:#666">${data.desc}</p>
                    <button class="btn btn-outline" onclick="requestSkill('${d.id}', '${data.uid}', '${data.title}')">REQUEST ACCESS</button></div>`;
                });
            });
        }

        window.requestSkill = async (skillId, teacherId, title) => {
            await addDoc(collection(db, "transactions"), {
                skillId, title, teacherId, learnerId: user.uid, learnerEmail: user.email, 
                status: 'pending', link: '', time: '', created: serverTimestamp()
            });
            alert("Request Sent to Teacher.");
        };

        // REQUESTS (FOR ME)
        function loadIncomingRequests() {
            const q = query(collection(db, "transactions"), where("teacherId", "==", user.uid), where("status", "==", "pending"));
            onSnapshot(q, s => {
                const list = document.getElementById('incomingList');
                list.innerHTML = s.empty ? '<p style="color:#333">No active requests.</p>' : '';
                s.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="card"><h4>${t.learnerEmail} wants to learn ${t.title}</h4>
                    <input type="text" id="link-${d.id}" placeholder="Meeting Link">
                    <input type="text" id="time-${d.id}" placeholder="Scheduled Time">
                    <button class="btn btn-primary" onclick="approveRequest('${d.id}')">APPROVE & SEND LINK</button></div>`;
                });
            });
        }

        window.approveRequest = async (id) => {
            const link = document.getElementById(`link-${id}`).value;
            const time = document.getElementById(`time-${id}`).value;
            if(!link) return alert("Please provide a link.");
            await updateDoc(doc(db, "transactions", id), { link, time, status: 'approved' });
        };

        // HISTORY (PENDING LOGS)
        function loadHistory() {
            onSnapshot(collection(db, "transactions"), s => {
                const body = document.getElementById('historyBody');
                body.innerHTML = '';
                s.forEach(d => {
                    const t = d.data();
                    if(t.learnerId !== user.uid && t.teacherId !== user.uid) return;
                    
                    let statusClass = t.status === 'completed' ? 'status-completed' : 'status-pending';
                    let action = t.link ? `<b>Link:</b> ${t.link}<br><b>Time:</b> ${t.time}` : '<i>Awaiting Teacher</i>';
                    
                    if(t.status === 'approved' && t.learnerId === user.uid) {
                        action += `<br><button class="btn btn-primary" style="margin-top:10px" onclick="releaseCredits('${d.id}', '${t.teacherId}')">CONFIRM & PAY</button>`;
                    }

                    body.innerHTML += `<tr>
                        <td>${t.title}</td>
                        <td>${t.teacherId === user.uid ? t.learnerEmail : 'Teacher Node'}</td>
                        <td class="${statusClass}">${t.status.toUpperCase()}</td>
                        <td style="font-size:12px">${action}</td>
                    </tr>`;
                });
            });
        }

        window.releaseCredits = async (transId, teacherId) => {
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.data().credits < 1) return alert("Insufficient Credits.");
            await updateDoc(doc(db, "users", user.uid), { credits: increment(-1) });
            await updateDoc(doc(db, "users", teacherId), { credits: increment(1) });
            await updateDoc(doc(db, "transactions", transId), { status: 'completed' });
            alert("Credit Transferred Successfully.");
        };

        function loadMySkills() {
            const q = query(collection(db, "skills"), where("uid", "==", user.uid));
            onSnapshot(q, s => {
                const feed = document.getElementById('mySkillsFeed');
                feed.innerHTML = '';
                s.forEach(d => {
                    feed.innerHTML += `<div class="card"><h3>${d.data().title}</h3>
                    <button class="btn btn-danger" onclick="deleteSkill('${d.id}')">REMOVE POST</button></div>`;
                });
            });
        }
        window.deleteSkill = async (id) => { if(confirm("Permanently delete this post?")) await deleteDoc(doc(db, "skills", id)); };
    </script>
</body>
</html>
