<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlux | Professional Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; --sidebar-bg: #0a0a0b; --card-bg: #111114; 
            --accent: #00d4ff; --secondary: #6366f1; --border: #1f1f23; 
            --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #ef4444; 
            --success: #10b981; --pending: #f59e0b;
        }

        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

        /* Navigation & Sidebar */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: rgba(5, 5, 5, 0.8); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
        }
        .menu-trigger { font-size: 20px; color: var(--accent); cursor: pointer; transition: 0.3s; }
        .nav-brand { font-weight: 800; letter-spacing: 2px; font-size: 20px; color: var(--text-main); text-decoration: none; }
        
        .sidebar { 
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: var(--sidebar-bg); border-right: 1px solid var(--border); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; padding: 40px 20px; 
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .sidebar-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: none; z-index: 150; 
        }

        .sidebar h3 { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .side-link { 
            padding: 12px 15px; color: var(--text-main); text-decoration: none; 
            font-size: 14px; display: flex; align-items: center; gap: 12px; 
            border-radius: 8px; margin-bottom: 5px; transition: 0.2s; cursor: pointer;
        }
        .side-link:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
        .side-link.logout { margin-top: auto; color: var(--danger); }

        /* Dashboard UI */
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .hidden { display: none; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        .section-header { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-header::after { content: ""; height: 1px; flex-grow: 1; background: var(--border); }

        .btn { padding: 10px 16px; border: none; cursor: pointer; font-weight: 700; border-radius: 6px; font-size: 11px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        input, textarea { 
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 12px; margin-bottom: 12px; border-radius: 8px; box-sizing: border-box; 
        }
        input:focus { border-color: var(--accent); outline: none; }

        .user-pill { background: #1a1a1e; padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Command Menu</h3>
        <div class="side-link" onclick="switchTab('feed')"><i class="fas fa-globe"></i> Market Place</div>
        <div class="side-link" onclick="switchTab('my-posts')"><i class="fas fa-box"></i> My Inventory</div>
        <div class="side-link" onclick="switchTab('requests')"><i class="fas fa-bell"></i> Alerts</div>
        <div class="side-link" onclick="switchTab('history')"><i class="fas fa-list"></i> History</div>
        
        <h3 style="margin-top: 30px;">Security</h3>
        <div class="side-link" onclick="switchTab('profile')"><i class="fas fa-user-shield"></i> Account Details</div>
        <div class="side-link logout" onclick="handleLogout()"><i class="fas fa-power-off"></i> Terminate Session</div>
    </div>

    <nav>
        <div class="menu-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <a href="#" class="nav-brand">SKILLFLUX</a>
        <div class="user-pill"><span id="creditBalance">0</span> CR</div>
    </nav>

    <div class="container">
        <!-- MARKET PLACE (OTHERS ONLY) -->
        <section id="feedSection">
            <div class="section-header">Market Place</div>
            <div id="globalFeed"></div>
        </section>

        <!-- INVENTORY (YOUR POSTS ONLY) -->
        <section id="my-postsSection" class="hidden">
            <div class="section-header">Inventory Deployment</div>
            <div class="card">
                <input type="text" id="skillTitle" placeholder="Skill Title">
                <textarea id="skillDesc" placeholder="Describe your expertise..."></textarea>
                <button class="btn btn-primary" id="saveBtn">Publish to Inventory</button>
            </div>
            <div class="section-header">Active Inventory</div>
            <div id="mySkillsFeed"></div>
        </section>

        <!-- ALERTS -->
        <section id="requestsSection" class="hidden">
            <div class="section-header">Session Alerts</div>
            <div id="incomingList"></div>
        </section>

        <!-- HISTORY -->
        <section id="historySection" class="hidden">
            <div class="section-header">Transaction Log</div>
            <div id="historyBody"></div>
        </section>

        <!-- PROFILE -->
        <section id="profileSection" class="hidden">
            <div class="section-header">Account Protocol</div>
            <div class="card">
                <p style="font-size: 12px; color: var(--text-dim);">AUTHORIZED EMAIL</p>
                <p id="profEmail" style="font-weight: bold; margin-bottom: 20px;">...</p>
                
                <p style="font-size: 12px; color: var(--text-dim);">CREDENTIAL MANAGEMENT</p>
                <input type="password" id="newPass" placeholder="New Password">
                <button class="btn btn-outline" onclick="changePassword()">Update Password</button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, increment, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3UlP_V8aDYmybmcIseDn-NkVIE2CNhT8",
            authDomain: "skillflux-cf990.firebaseapp.com",
            projectId: "skillflux-cf990",
            storageBucket: "skillflux-cf990.firebasestorage.app",
            messagingSenderId: "25137352875",
            appId: "1:25137352875:web:f01bcbaa3eb64f99a527ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        // UI Helpers
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        };

        window.switchTab = (tab) => {
            ['feed', 'my-posts', 'requests', 'history', 'profile'].forEach(id => {
                document.getElementById(id+'Section').classList.add('hidden');
            });
            document.getElementById(tab+'Section').classList.remove('hidden');
            toggleSidebar();
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; init(); document.getElementById('profEmail').innerText = u.email; }
            else { window.location.href="index.html"; }
        });

        function init() {
            onSnapshot(doc(db, "users", user.uid), s => { if(s.exists()) document.getElementById('creditBalance').innerText = s.data().credits; });
            loadMarket();
            loadInventory();
            loadHistory();
        }

        // --- ACCOUNT LOGIC ---
        window.changePassword = async () => {
            const p = document.getElementById('newPass').value;
            if(p.length < 6) return alert("Password too short.");
            await updatePassword(user, p).then(() => alert("Password Updated.")).catch(e => alert("Re-login required."));
        };

        window.handleLogout = () => signOut(auth);

        // --- POSTING & INVENTORY ISOLATION ---
        document.getElementById('saveBtn').onclick = async () => {
            const title = document.getElementById('skillTitle').value;
            const desc = document.getElementById('skillDesc').value;
            if(!title) return;
            await addDoc(collection(db, "skills"), { title, desc, uid: user.uid, email: user.email, timestamp: serverTimestamp() });
            document.getElementById('skillTitle').value = ''; document.getElementById('skillDesc').value = '';
            alert("Published to Inventory.");
        };

        function loadInventory() {
            // Only see YOUR OWN posts in Inventory
            const q = query(collection(db, "skills"), where("uid", "==", user.uid));
            onSnapshot(q, s => {
                const div = document.getElementById('mySkillsFeed');
                div.innerHTML = s.empty ? '<p style="color:#333">No items.</p>' : '';
                s.forEach(d => {
                    div.innerHTML += `<div class="card"><b>${d.data().title}</b><br><button class="btn btn-outline" style="margin-top:10px" onclick="deleteSkill('${d.id}')">Delete</button></div>`;
                });
            });
        }
        window.deleteSkill = (id) => deleteDoc(doc(db, "skills", id));

        function loadMarket() {
            // Only see OTHERS' posts in Market
            onSnapshot(collection(db, "skills"), s => {
                const div = document.getElementById('globalFeed');
                div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    if(data.uid === user.uid) return; // SKIP YOUR OWN
                    div.innerHTML += `<div class="card">
                        <h3 style="color:var(--accent); margin-top:0;">${data.title}</h3>
                        <p style="color:var(--text-dim); font-size:13px;">${data.desc}</p>
                        <button class="btn btn-primary" onclick="buy('${d.id}','${data.uid}','${data.title}')">Acquire (1 CR)</button>
                    </div>`;
                });
            });
        }

        window.buy = async (sid, tid, title) => {
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.data().credits < 1) return alert("No Credits.");
            await updateDoc(doc(db, "users", user.uid), { credits: increment(-1) });
            await addDoc(collection(db, "transactions"), { skillId: sid, title, teacherId: tid, learnerId: user.uid, status: 'pending' });
            alert("Request sent. Credit Escrowed.");
        };

        function loadHistory() {
            onSnapshot(collection(db, "transactions"), s => {
                const div = document.getElementById('historyBody'); div.innerHTML = '';
                s.forEach(d => {
                    const t = d.data();
                    if(t.learnerId !== user.uid && t.teacherId !== user.uid) return;
                    div.innerHTML += `<div class="card"><b>${t.title}</b> | Status: ${t.status}</div>`;
                });
            });
        }
    </script>
</body>
</html>
