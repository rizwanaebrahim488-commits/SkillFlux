<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlux | Professional Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #000000; --card: #080808; --accent: #00d4ff; --border: #1a1a1a; 
            --text: #ffffff; --danger: #ff3333; --pending: #ffaa00; --success: #00ff88;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .nav-brand { font-weight: 900; color: var(--accent); letter-spacing: 4px; font-size: 22px; text-decoration: none; }
        .nav-link { color: #555; text-decoration: none; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        .user-stats { background: #111; padding: 8px 15px; border: 1px solid var(--border); color: var(--accent); font-weight: 800; border-radius: 4px; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .hidden { display: none; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        
        h2 { font-size: 11px; color: #444; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; border-left: 2px solid var(--accent); padding-left: 15px; }
        
        .btn { padding: 10px 18px; border: none; cursor: pointer; font-weight: 700; border-radius: 3px; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-danger { background: #1a0000; border: 1px solid var(--danger); color: var(--danger); }
        
        input, textarea { width: 100%; background: #050505; border: 1px solid #1a1a1a; color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #444; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #111; }
        td { padding: 15px; border-bottom: 1px solid #080808; font-size: 13px; color: #bbb; }
        
        .notification-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 50%; font-size: 10px; margin-left: 5px; }
        .status-tag { font-size: 9px; padding: 3px 7px; border-radius: 3px; font-weight: 900; background: #111; }
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 30px;">
            <a href="#" class="nav-brand">SKILLFLUX</a>
            <a class="nav-link active" id="link-feed" onclick="showSection('feed')">Market</a>
            <a class="nav-link" id="link-my-posts" onclick="showSection('my-posts')">Inventory</a>
            <a class="nav-link" id="link-requests" onclick="showSection('requests')">Alerts <span id="reqCount" class="hidden notification-badge">0</span></a>
            <a class="nav-link" id="link-history" onclick="showSection('history')">Ledger</a>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="user-stats"><span id="creditBalance">0</span> CR</div>
            <a href="index.html" class="nav-link" style="color: var(--danger);">Exit</a>
        </div>
    </nav>

    <div class="container">
        <!-- GLOBAL FEED -->
        <section id="feedSection">
            <h2>Global Skill Grid</h2>
            <div id="globalFeed"></div>
        </section>

        <!-- MY POSTS (PRIVATE) -->
        <section id="my-postsSection" class="hidden">
            <h2>Initialize Listing</h2>
            <div class="card">
                <input type="text" id="skillTitle" placeholder="Protocol Name (e.g. Python Backend)">
                <textarea id="skillDesc" rows="3" placeholder="Scope of knowledge transfer..."></textarea>
                <button class="btn btn-primary" id="saveBtn">Deploy to Grid</button>
            </div>
            <h2>Your Active Protocols</h2>
            <div id="mySkillsFeed"></div>
        </section>

        <!-- REQUESTS (NOTIFICATIONS) -->
        <section id="requestsSection" class="hidden">
            <h2>Incoming Session Alerts</h2>
            <div id="incomingList"></div>
        </section>

        <!-- HISTORY (LEDGER) -->
        <section id="historySection" class="hidden">
            <h2>Financial Transaction History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Protocol</th>
                        <th>Entity</th>
                        <th>Credit</th>
                        <th>Status / Execution</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, increment, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3UlP_V8aDYmybmcIseDn-NkVIE2CNhT8",
            authDomain: "skillflux-cf990.firebaseapp.com",
            projectId: "skillflux-cf990",
            storageBucket: "skillflux-cf990.firebasestorage.app",
            messagingSenderId: "25137352875",
            appId: "1:25137352875:web:f01bcbaa3eb64f99a527ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        window.showSection = (name) => {
            ['feed', 'my-posts', 'requests', 'history'].forEach(s => {
                document.getElementById(s+'Section').classList.add('hidden');
                document.getElementById('link-'+s).classList.remove('active');
            });
            document.getElementById(name+'Section').classList.remove('hidden');
            document.getElementById('link-'+name).classList.add('active');
        };

        onAuthStateChanged(auth, u => { if(u) { user = u; init(); } else { window.location.href="index.html"; } });

        function init() {
            onSnapshot(doc(db, "users", user.uid), s => { 
                if(s.exists()) document.getElementById('creditBalance').innerText = s.data().credits; 
            });
            loadGlobalFeed();
            loadMySkills();
            loadIncomingRequests();
            loadHistory();
        }

        // --- INVENTORY (MY POSTS ONLY) ---
        document.getElementById('saveBtn').onclick = async () => {
            const title = document.getElementById('skillTitle').value;
            const desc = document.getElementById('skillDesc').value;
            if(!title) return;
            await addDoc(collection(db, "skills"), { title, desc, uid: user.uid, email: user.email, timestamp: serverTimestamp() });
            document.getElementById('skillTitle').value = '';
            document.getElementById('skillDesc').value = '';
        };

        function loadMySkills() {
            // STRICT FILTER: Only show posts where UID matches current user
            const q = query(collection(db, "skills"), where("uid", "==", user.uid));
            onSnapshot(q, s => {
                const feed = document.getElementById('mySkillsFeed');
                feed.innerHTML = s.empty ? '<p style="color:#222">Empty.</p>' : '';
                s.forEach(d => {
                    feed.innerHTML += `<div class="card" style="border-left: 2px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div><b style="color:var(--accent)">${d.data().title}</b></div>
                            <button class="btn btn-danger" onclick="deleteSkill('${d.id}')">Decommission</button>
                        </div>
                    </div>`;
                });
            });
        }
        window.deleteSkill = async (id) => { if(confirm("Confirm Delete?")) await deleteDoc(doc(db, "skills", id)); };

        // --- GLOBAL MARKET ---
        function loadGlobalFeed() {
            onSnapshot(collection(db, "skills"), s => {
                const feed = document.getElementById('globalFeed');
                feed.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    if(data.uid === user.uid) return; // Hide your own from global
                    feed.innerHTML += `<div class="card">
                        <h3 style="color:var(--accent); margin:0 0 10px 0;">${data.title}</h3>
                        <p style="color:#777; font-size:13px; line-height:1.5;">${data.desc}</p>
                        <button class="btn btn-outline" onclick="initiateAcquisition('${d.id}', '${data.uid}', '${data.title}')">Acquire Request (1 CR)</button>
                    </div>`;
                });
            });
        }

        window.initiateAcquisition = async (skillId, teacherId, title) => {
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.data().credits < 1) return alert("Insufficient balance.");

            // 1. Deduct credit immediately (Escrow Lock)
            await updateDoc(doc(db, "users", user.uid), { credits: increment(-1) });

            // 2. Create Transaction
            await addDoc(collection(db, "transactions"), {
                skillId, title, teacherId, learnerId: user.uid, learnerEmail: user.email, 
                status: 'pending', link: '', time: '', proof: '', created: serverTimestamp()
            });
            alert("Credit locked in Escrow. Request sent.");
        };

        // --- ALERTS (NOTIFICATIONS) ---
        function loadIncomingRequests() {
            const q = query(collection(db, "transactions"), where("teacherId", "==", user.uid), where("status", "==", "pending"));
            onSnapshot(q, s => {
                const list = document.getElementById('incomingList');
                const badge = document.getElementById('reqCount');
                badge.innerText = s.size;
                s.size > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
                
                list.innerHTML = s.empty ? '<p style="color:#222">Systems Nominal. No alerts.</p>' : '';
                s.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="card" style="border-left: 2px solid var(--pending)">
                        <p style="color:var(--pending); font-size:9px; margin:0;">PENDING SESSION</p>
                        <h4 style="margin:10px 0;">${t.learnerEmail} >> ${t.title}</h4>
                        <input type="text" id="link-${d.id}" placeholder="Link (GMeet/Zoom)">
                        <input type="text" id="time-${d.id}" placeholder="Schedule (e.g. 14:00 GMT)">
                        <button class="btn btn-primary" onclick="acceptSession('${d.id}')">Confirm & Send Link</button>
                    </div>`;
                });
            });
        }

        window.acceptSession = async (id) => {
            const link = document.getElementById(`link-${id}`).value;
            const time = document.getElementById(`time-${id}`).value;
            if(!link) return alert("Link required.");
            await updateDoc(doc(db, "transactions", id), { link, time, status: 'approved' });
        };

        // --- LEDGER (HISTORY) ---
        function loadHistory() {
            onSnapshot(collection(db, "transactions"), s => {
                const body = document.getElementById('historyBody');
                body.innerHTML = '';
                s.forEach(d => {
                    const t = d.data();
                    if(t.learnerId !== user.uid && t.teacherId !== user.uid) return;
                    
                    let flow = t.teacherId === user.uid ? `<span style="color:var(--success)">+1.00</span>` : `<span style="color:var(--danger)">-1.00</span>`;
                    let statusColor = t.status === 'completed' ? 'var(--success)' : (t.status === 'approved' ? 'var(--accent)' : 'var(--pending)');
                    
                    let action = "";
                    if(t.status === 'approved' && t.learnerId === user.uid) {
                        action = `
                            <div style="margin-top:10px;">
                                <input type="text" id="proof-${d.id}" placeholder="Screenshot URL (Imgur/Drive Link)" style="font-size:10px; padding:5px;">
                                <button class="btn btn-primary" style="width:100%;" onclick="completePayment('${d.id}', '${t.teacherId}')">Verify & Release Credit</button>
                            </div>`;
                    } else if (t.link) {
                        action = `<div style="font-size:11px; color:#555;">LINK: ${t.link}<br>TIME: ${t.time}</div>`;
                    }

                    body.innerHTML += `<tr>
                        <td><b style="color:#fff">${t.title}</b></td>
                        <td>${t.teacherId === user.uid ? t.learnerEmail : 'Teacher'}</td>
                        <td>${flow}</td>
                        <td>
                            <span class="status-tag" style="color:${statusColor}">${t.status.toUpperCase()}</span>
                            ${action}
                        </td>
                    </tr>`;
                });
            });
        }

        window.completePayment = async (transId, teacherId) => {
            const proof = document.getElementById(`proof-${transId}`).value;
            if(!proof) return alert("Please provide screenshot link as proof of class.");
            
            // Only one time accept: Moves credit from learner's "locked" state to teacher's balance
            await updateDoc(doc(db, "users", teacherId), { credits: increment(1) });
            await updateDoc(doc(db, "transactions", transId), { status: 'completed', proof: proof });
            alert("Transaction finalized. Credit released to teacher.");
        };
    </script>
</body>
</html>
