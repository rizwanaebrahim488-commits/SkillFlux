<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlux | Cyber Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #000000; 
            --card-bg: #0a0a0c;
            --accent: #00f2ff; /* Neon Cyan */
            --secondary: #7000ff; /* Electric Purple */
            --border: #1a1a1f; 
            --text-main: #ffffff;
            --text-dim: #888888;
            --danger: #ff0055;
            --pending: #ffb700;
            --success: #00ffa2;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: 0.5px;
        }

        /* Glassmorphism Nav */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 40px; 
            background: rgba(10, 10, 12, 0.8);
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; 
            backdrop-filter: blur(15px);
        }

        .nav-brand { 
            font-weight: 900; 
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px; 
            font-size: 24px; 
            text-decoration: none; 
        }

        .nav-links { display: flex; gap: 25px; align-items: center; }

        .nav-link { 
            color: var(--text-dim); 
            text-decoration: none; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        
        .user-stats { 
            background: linear-gradient(45deg, #111, #000);
            padding: 6px 15px; 
            border: 1px solid var(--secondary); 
            color: var(--accent); 
            font-weight: 900; 
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.2);
        }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .hidden { display: none; }

        /* Cyber Card Styling */
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover { 
            border-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.1);
        }
        
        h2 { 
            font-size: 10px; color: var(--text-dim); 
            letter-spacing: 4px; text-transform: uppercase; 
            margin-bottom: 30px; 
            display: flex; align-items: center; gap: 10px;
        }
        h2::after { content: ""; height: 1px; flex-grow: 1; background: var(--border); }

        /* Buttons */
        .btn { 
            padding: 12px 20px; border: none; cursor: pointer; 
            font-weight: 800; border-radius: 6px; 
            font-size: 10px; text-transform: uppercase; 
            transition: 0.3s; 
        }
        .btn-primary { 
            background: var(--accent); color: #000; 
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }
        .btn-primary:hover { background: #fff; transform: scale(1.02); }
        
        .btn-outline { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
        }
        .btn-outline:hover { background: rgba(0, 242, 255, 0.1); }

        .btn-danger { background: rgba(255, 0, 85, 0.1); border: 1px solid var(--danger); color: var(--danger); }

        /* Forms */
        input, textarea { 
            width: 100%; background: #0c0c0e; border: 1px solid var(--border); 
            color: #fff; padding: 14px; margin-bottom: 12px; border-radius: 8px; 
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--secondary); outline: none; background: #111; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 9px; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border); font-size: 13px; color: #eee; }

        .notification-badge { 
            background: var(--danger); color: white; padding: 2px 6px; 
            border-radius: 4px; font-size: 9px; vertical-align: middle;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="#" class="nav-brand">SKILLFLUX</a>
            <a class="nav-link active" id="link-feed" onclick="showSection('feed')">Market</a>
            <a class="nav-link" id="link-my-posts" onclick="showSection('my-posts')">Inventory</a>
            <a class="nav-link" id="link-requests" onclick="showSection('requests')">Alerts <span id="reqCount" class="hidden notification-badge">0</span></a>
            <a class="nav-link" id="link-history" onclick="showSection('history')">Ledger</a>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="user-stats"><span id="creditBalance">0</span> CR</div>
            <a href="index.html" class="nav-link" style="color: var(--danger);">Disconnect</a>
        </div>
    </nav>

    <div class="container">
        <!-- GLOBAL MARKET -->
        <section id="feedSection">
            <h2>Live Protocol Grid</h2>
            <div id="globalFeed"></div>
        </section>

        <!-- MY INVENTORY (ONLY YOURS) -->
        <section id="my-postsSection" class="hidden">
            <h2>Initialize Listing</h2>
            <div class="card" style="border: 1px dashed var(--secondary);">
                <input type="text" id="skillTitle" placeholder="Protocol Name (e.g. Neural Networks)">
                <textarea id="skillDesc" rows="3" placeholder="Describe the expertise parameters..."></textarea>
                <button class="btn btn-primary" id="saveBtn">Deploy to Network</button>
            </div>
            <h2>Your Active Protocols</h2>
            <div id="mySkillsFeed"></div>
        </section>

        <!-- ALERTS -->
        <section id="requestsSection" class="hidden">
            <h2>Access Requests</h2>
            <div id="incomingList"></div>
        </section>

        <!-- LEDGER -->
        <section id="historySection" class="hidden">
            <h2>Credit Transactions</h2>
            <table>
                <thead>
                    <tr>
                        <th>Protocol</th>
                        <th>Entity</th>
                        <th>Credit</th>
                        <th>Execution Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, increment, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3UlP_V8aDYmybmcIseDn-NkVIE2CNhT8",
            authDomain: "skillflux-cf990.firebaseapp.com",
            projectId: "skillflux-cf990",
            storageBucket: "skillflux-cf990.firebasestorage.app",
            messagingSenderId: "25137352875",
            appId: "1:25137352875:web:f01bcbaa3eb64f99a527ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        window.showSection = (name) => {
            ['feed', 'my-posts', 'requests', 'history'].forEach(s => {
                document.getElementById(s+'Section').classList.add('hidden');
                document.getElementById('link-'+s).classList.remove('active');
            });
            document.getElementById(name+'Section').classList.remove('hidden');
            document.getElementById('link-'+name).classList.add('active');
        };

        onAuthStateChanged(auth, u => { if(u) { user = u; init(); } else { window.location.href="index.html"; } });

        function init() {
            onSnapshot(doc(db, "users", user.uid), s => { 
                if(s.exists()) document.getElementById('creditBalance').innerText = s.data().credits; 
            });
            loadGlobalFeed();
            loadMySkills();
            loadIncomingRequests();
            loadHistory();
        }

        // --- INVENTORY LOGIC (STRICT PRIVACY) ---
        document.getElementById('saveBtn').onclick = async () => {
            const title = document.getElementById('skillTitle').value;
            const desc = document.getElementById('skillDesc').value;
            if(!title) return;
            await addDoc(collection(db, "skills"), { title, desc, uid: user.uid, email: user.email, timestamp: serverTimestamp() });
            document.getElementById('skillTitle').value = '';
            document.getElementById('skillDesc').value = '';
            alert("Protocol Deployed.");
        };

        function loadMySkills() {
            const q = query(collection(db, "skills"), where("uid", "==", user.uid));
            onSnapshot(q, s => {
                const feed = document.getElementById('mySkillsFeed');
                feed.innerHTML = s.empty ? '<p style="color:#333">No active inventory.</p>' : '';
                s.forEach(d => {
                    feed.innerHTML += `<div class="card" style="border-left: 3px solid var(--secondary)">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b style="color:var(--accent)">${d.data().title}</b>
                            <button class="btn btn-danger" onclick="deleteSkill('${d.id}')">Remove</button>
                        </div>
                    </div>`;
                });
            });
        }
        window.deleteSkill = async (id) => { if(confirm("Purge Protocol?")) await deleteDoc(doc(db, "skills", id)); };

        // --- MARKET LOGIC (HIDE OWN) ---
        function loadGlobalFeed() {
            onSnapshot(collection(db, "skills"), s => {
                const feed = document.getElementById('globalFeed');
                feed.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    if(data.uid === user.uid) return; 
                    feed.innerHTML += `<div class="card">
                        <h3 style="color:var(--accent); margin:0 0 10px 0;">${data.title}</h3>
                        <p style="color:var(--text-dim); font-size:13px;">${data.desc}</p>
                        <button class="btn btn-outline" style="width:100%; margin-top:15px;" onclick="initiateAcquisition('${d.id}', '${data.uid}', '${data.title}')">Acquire (1 CR)</button>
                    </div>`;
                });
            });
        }

        window.initiateAcquisition = async (skillId, teacherId, title) => {
            const uSnap = await getDoc(doc(db, "users", user.uid));
            if(uSnap.data().credits < 1) return alert("Credit Deficit.");

            // ESCROW LOCK: Deduct 1 credit before class
            await updateDoc(doc(db, "users", user.uid), { credits: increment(-1) });

            await addDoc(collection(db, "transactions"), {
                skillId, title, teacherId, learnerId: user.uid, learnerEmail: user.email, 
                status: 'pending', link: '', time: '', proof: '', created: serverTimestamp()
            });
            alert("1 Credit Locked in Escrow. Waiting for Teacher.");
        };

        // --- ALERTS (NOTIFICATIONS) ---
        function loadIncomingRequests() {
            const q = query(collection(db, "transactions"), where("teacherId", "==", user.uid), where("status", "==", "pending"));
            onSnapshot(q, s => {
                const list = document.getElementById('incomingList');
                const badge = document.getElementById('reqCount');
                badge.innerText = s.size;
                s.size > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
                
                list.innerHTML = s.empty ? '<p style="color:#222">No incoming pings.</p>' : '';
                s.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="card" style="border-left: 3px solid var(--pending)">
                        <p style="color:var(--pending); font-size:9px; font-weight:bold;">PENDING CONNECTION</p>
                        <h4 style="margin:10px 0;">${t.learnerEmail} requested access to: ${t.title}</h4>
                        <input type="text" id="link-${d.id}" placeholder="Provide Meeting Link">
                        <input type="text" id="time-${d.id}" placeholder="Specify Time">
                        <button class="btn btn-primary" style="width:100%;" onclick="acceptSession('${d.id}')">Authorize & Send Link</button>
                    </div>`;
                });
            });
        }

        window.acceptSession = async (id) => {
            const link = document.getElementById(`link-${id}`).value;
            const time = document.getElementById(`time-${id}`).value;
            if(!link) return alert("Link is required.");
            await updateDoc(doc(db, "transactions", id), { link, time, status: 'approved' });
        };

        // --- LEDGER (HISTORY) ---
        function loadHistory() {
            onSnapshot(collection(db, "transactions"), s => {
                const body = document.getElementById('historyBody');
                body.innerHTML = '';
                s.forEach(d => {
                    const t = d.data();
                    if(t.learnerId !== user.uid && t.teacherId !== user.uid) return;
                    
                    let flow = t.teacherId === user.uid ? `<span style="color:var(--success)">+1.00</span>` : `<span style="color:var(--danger)">-1.00</span>`;
                    let action = "";
                    
                    if(t.status === 'approved' && t.learnerId === user.uid) {
                        action = `<div style="margin-top:10px;">
                                <input type="text" id="proof-${d.id}" placeholder="Proof (Screenshot Link)" style="padding:6px; font-size:10px;">
                                <button class="btn btn-primary" style="width:100%; margin-top:5px;" onclick="completePayment('${d.id}', '${t.teacherId}')">Finalize & Release</button>
                            </div>`;
                    } else if (t.link) {
                        action = `<div style="font-size:11px; color:var(--text-dim); margin-top:5px;">Link: ${t.link}<br>Time: ${t.time}</div>`;
                    }

                    body.innerHTML += `<tr>
                        <td><b>${t.title}</b></td>
                        <td>${t.teacherId === user.uid ? t.learnerEmail : 'Remote Teacher'}</td>
                        <td>${flow}</td>
                        <td style="text-align:right;">
                            <span style="font-size:10px; font-weight:bold; color:${t.status === 'completed' ? 'var(--success)' : 'var(--pending)'}">${t.status.toUpperCase()}</span>
                            ${action}
                        </td>
                    </tr>`;
                });
            });
        }

        window.completePayment = async (transId, teacherId) => {
            const proof = document.getElementById(`proof-${transId}`).value;
            if(!proof) return alert("Evidence URL required.");
            
            // Move credit from "escrow/locked" to teacher's balance
            await updateDoc(doc(db, "users", teacherId), { credits: increment(1) });
            await updateDoc(doc(db, "transactions", transId), { status: 'completed', proof: proof });
            alert("Payment Released. Session Complete.");
        };
    </script>
</body>
</html>
