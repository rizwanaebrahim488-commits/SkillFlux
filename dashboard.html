<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlux | Professional Emerald</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #121417; /* Deep Charcoal */
            --sidebar-bg: #1a1d21; 
            --card-bg: #1e2227; 
            --accent: #10b981; /* Emerald Green */
            --accent-hover: #059669;
            --border: #2d343c; 
            --text-main: #f1f5f9; 
            --text-dim: #94a3b8; 
            --danger: #f43f5e; 
            --success: #10b981;
        }

        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Navigation */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; height: 70px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100;
        }
        .nav-links { display: flex; gap: 30px; height: 100%; align-items: center; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; cursor: pointer; 
            font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            height: 100%; display: flex; align-items: center; border-bottom: 3px solid transparent;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .nav-brand { font-weight: 800; font-size: 20px; color: #fff; text-decoration: none; margin-right: 40px; }

        /* Right Sidebar */
        .sidebar { 
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%; 
            background: var(--sidebar-bg); border-left: 1px solid var(--border); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; padding: 40px 25px; 
            box-sizing: border-box;
        }
        .sidebar.active { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .sidebar-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 150; 
        }

        /* Content Area */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .hidden { display: none; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        
        h2 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        /* Forms & Buttons */
        .btn { padding: 12px 20px; border: none; cursor: pointer; font-weight: 700; border-radius: 8px; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        input, textarea { 
            width: 100%; background: #121417; border: 1px solid var(--border); color: #fff; 
            padding: 14px; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; 
        }
        input:focus { border-color: var(--accent); outline: none; }

        .profile-box { padding: 15px; background: #121417; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .profile-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <!-- Right Sidebar (Account & Logout) -->
    <div class="sidebar" id="sidebar">
        <h2>Account Settings</h2>
        <div class="profile-box">
            <div class="profile-label">Authorized Node</div>
            <div id="profEmail" style="font-weight: 600; font-size: 14px;">...</div>
        </div>
        
        <h2 style="margin-top: 40px;">Security Protocol</h2>
        <input type="password" id="newPass" placeholder="Update Password">
        <button class="btn btn-outline" style="width: 100%;" onclick="changePassword()">Refresh Credentials</button>

        <button class="btn btn-danger" style="width: 100%; margin-top: auto; position: absolute; bottom: 40px; left: 0; width: calc(100% - 50px); margin-left: 25px;" onclick="handleLogout()">
            <i class="fas fa-power-off"></i> Terminate Session
        </button>
    </div>

    <!-- Navigation Bar -->
    <nav>
        <div class="nav-links">
            <a href="#" class="nav-brand">SKILLFLUX</a>
            <div class="nav-item active" id="tab-feed" onclick="switchTab('feed')">Market Place</div>
            <div class="nav-item" id="tab-my-posts" onclick="switchTab('my-posts')">My Inventory</div>
            <div class="nav-item" id="tab-requests" onclick="switchTab('requests')">Active Alerts</div>
            <div class="nav-item" id="tab-history" onclick="switchTab('history')">History Log</div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="color: var(--accent); font-weight: 800; font-size: 14px;"><span id="creditBalance">0</span> CR</div>
            <div style="cursor: pointer; font-size: 20px;" onclick="toggleSidebar()"><i class="fas fa-user-circle"></i></div>
        </div>
    </nav>

    <div class="container">
        <!-- GLOBAL MARKET (OTHERS' POSTS) -->
        <section id="feedSection">
            <h2>Global Skills Market</h2>
            <div id="globalFeed"></div>
        </section>

        <!-- MY INVENTORY (YOUR POSTS ONLY) -->
        <section id="my-postsSection" class="hidden">
            <h2>Post New expertise</h2>
            <div class="card">
                <input type="text" id="skillTitle" placeholder="Skill Title (e.g., UI Design)">
                <textarea id="skillDesc" rows="3" placeholder="Explain what you can teach..."></textarea>
                <button class="btn btn-primary" id="saveBtn">Deploy to Inventory</button>
            </div>
            <h2>Your Active Listings</h2>
            <div id="mySkillsFeed"></div>
        </section>

        <!-- ALERTS & HISTORY -->
        <section id="requestsSection" class="hidden">
            <h2>Notifications & Requests</h2>
            <div id="incomingList"></div>
        </section>

        <section id="historySection" class="hidden">
            <h2>Transaction Ledger</h2>
            <div id="historyBody"></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, increment, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3UlP_V8aDYmybmcIseDn-NkVIE2CNhT8",
            authDomain: "skillflux-cf990.firebaseapp.com",
            projectId: "skillflux-cf990",
            storageBucket: "skillflux-cf990.firebasestorage.app",
            messagingSenderId: "25137352875",
            appId: "1:25137352875:web:f01bcbaa3eb64f99a527ee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        // UI Logic
        window.toggleSidebar = () => {
            const side = document.getElementById('sidebar');
            const over = document.getElementById('overlay');
            side.classList.toggle('active');
            over.style.display = side.classList.contains('active') ? 'block' : 'none';
        };

        window.switchTab = (tab) => {
            ['feed', 'my-posts', 'requests', 'history'].forEach(id => {
                document.getElementById(id+'Section').classList.add('hidden');
                document.getElementById('tab-'+id).classList.remove('active');
            });
            document.getElementById(tab+'Section').classList.remove('hidden');
            document.getElementById('tab-'+tab).classList.add('active');
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; init(); document.getElementById('profEmail').innerText = u.email; }
            else { window.location.href="index.html"; }
        });

        function init() {
            onSnapshot(doc(db, "users", user.uid), s => { if(s.exists()) document.getElementById('creditBalance').innerText = s.data().credits; });
            loadMarket();
            loadInventory();
            loadHistory();
            loadAlerts();
        }

        // --- ACCOUNT ---
        window.changePassword = async () => {
            const p = document.getElementById('newPass').value;
            if(p.length < 6) return alert("Security too low.");
            await updatePassword(user, p).then(() => alert("Password Updated.")).catch(() => alert("Login again to perform this."));
        };
        window.handleLogout = () => signOut(auth);

        // --- SKILLS LOGIC (STRICT PRIVACY) ---
        document.getElementById('saveBtn').onclick = async () => {
            const title = document.getElementById('skillTitle').value;
            const desc = document.getElementById('skillDesc').value;
            if(!title) return;
            await addDoc(collection(db, "skills"), { title, desc, uid: user.uid, email: user.email, timestamp: serverTimestamp() });
            document.getElementById('skillTitle').value = ''; document.getElementById('skillDesc').value = '';
            alert("Protocol Deployed to Inventory.");
        };

        function loadInventory() {
            // YOU ONLY: Query where UID matches current user
            const q = query(collection(db, "skills"), where("uid", "==", user.uid));
            onSnapshot(q, s => {
                const div = document.getElementById('mySkillsFeed');
                div.innerHTML = s.empty ? '<p style="color:#444">Inventory Empty.</p>' : '';
                s.forEach(d => {
                    div.innerHTML += `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b style="color:var(--accent)">${d.data().title}</b>
                            <button class="btn btn-danger" style="padding:5px 10px; font-size:9px;" onclick="deleteSkill('${d.id}')">Remove</button>
                        </div>
                    </div>`;
                });
            });
        }
        window.deleteSkill = (id) => deleteDoc(doc(db, "skills", id));

        function loadMarket() {
            // OTHERS ONLY: Load all, hide current user's UID
            onSnapshot(collection(db, "skills"), s => {
                const div = document.getElementById('globalFeed');
                div.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    if(data.uid === user.uid) return; 
                    div.innerHTML += `<div class="card">
                        <h3 style="margin:0; color:var(--accent);">${data.title}</h3>
                        <p style="color:var(--text-dim); font-size:13px; margin:15px 0;">${data.desc}</p>
                        <button class="btn btn-primary" onclick="buy('${d.id}','${data.uid}','${data.title}')">Acquire (1 CR)</button>
                    </div>`;
                });
            });
        }

        window.buy = async (sid, tid, title) => {
            const u = await getDoc(doc(db, "users", user.uid));
            if(u.data().credits < 1) return alert("Low credits.");
            await updateDoc(doc(db, "users", user.uid), { credits: increment(-1) });
            await addDoc(collection(db, "transactions"), { skillId: sid, title, teacherId: tid, learnerId: user.uid, status: 'pending', created: serverTimestamp() });
            alert("Request sent. Credit locked in escrow.");
        };

        function loadAlerts() {
            const q = query(collection(db, "transactions"), where("teacherId", "==", user.uid), where("status", "==", "pending"));
            onSnapshot(q, s => {
                const list = document.getElementById('incomingList');
                list.innerHTML = s.empty ? '<p style="color:#444">No alerts.</p>' : '';
                s.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="card" style="border-left: 3px solid orange">
                        <p style="font-size:10px; color:orange">INCOMING REQUEST</p>
                        <b>${t.title}</b>
                        <input type="text" id="link-${d.id}" placeholder="Meeting Link" style="margin-top:10px;">
                        <button class="btn btn-primary" style="width:100%" onclick="accept('${d.id}')">Send Access</button>
                    </div>`;
                });
            });
        }
        window.accept = async (id) => {
            const l = document.getElementById(`link-${id}`).value;
            if(!l) return;
            await updateDoc(doc(db, "transactions", id), { link: l, status: 'approved' });
        };

        function loadHistory() {
            onSnapshot(collection(db, "transactions"), s => {
                const body = document.getElementById('historyBody'); body.innerHTML = '';
                s.forEach(d => {
                    const t = d.data();
                    if(t.learnerId !== user.uid && t.teacherId !== user.uid) return;
                    body.innerHTML += `<div class="card" style="font-size:13px;"><b>${t.title}</b> | Status: <span style="color:var(--accent)">${t.status.toUpperCase()}</span></div>`;
                });
            });
        }
    </script>
</body>
</html>
